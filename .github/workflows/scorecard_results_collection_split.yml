name: Split Results Collection

on:
  workflow_call:
    inputs:
      action_id:
        type: string
        required: true

      s3_prefix:
        description: |
          S3 prefix for context-binary uploads (forwarded to scorecard_test_export_scripts.yml).
          Empty disables S3 upload.
        type: string
        default: ''

      run_accuracy:
        description: Run on-device accuracy computation
        type: boolean
        default: false

      models:
        description: Models for which to run the tests. If unset, tests all models run in the scorecard action above.
        type: string
        required: false

      max_models_per_split:
        description: Maximum number of PyTorch models per split when auto-splitting
        default: 30
        type: number

      max_num_splits:
        description: Maximum number of PyTorch model splits to create (0 = no limit)
        type: number
        default: 0

env:
  VENV_PATH: build/ci-envs/qaihm-build

jobs:
  split_models:
    name: Split Models
    runs-on: [tetra-ubuntu-2204, self-hosted]
    outputs:
      export_matrix: ${{ steps.split.outputs.export_matrix }}
      accuracy_matrix: ${{ steps.split.outputs.accuracy_matrix }}
    steps:
      - uses: actions/checkout@v6

      - name: CI Setup
        uses: ./.github/actions/ci-setup
        with:
          sudo-password: ${{ secrets.TETRASERVICE_PASSWORD }}
          venv-path: ${{ env.VENV_PATH }}

      - name: Download Post-Flaky-Job-Retry Artifacts
        id: download-post-flaky-job-retry-artifacts
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
            run-id: ${{ inputs.action_id }}
            github-token: ${{ github.token }}
            name: Scorecard Cached Artifact (Job-IDs, ${{ inputs.action_id }})
            path: build/scorecard-yamls/${{ inputs.action_id }}

      - name: Download Flaky-Job Artifacts
        if: steps.download-post-flaky-job-retry-artifacts.outcome == 'failure'
        uses: actions/download-artifact@v8
        with:
            run-id: ${{ inputs.action_id }}
            github-token: ${{ github.token }}
            name: Scorecard Cached Artifact (Flaky-Job-IDs, ${{ inputs.action_id }})
            path: build/scorecard-yamls/${{ inputs.action_id }}

      - name: Determine Models
        id: determine_models
        run: |
          if [[ -n "${{ inputs.models }}" ]]; then
            echo "models=${{ inputs.models }}" >> "$GITHUB_OUTPUT"
          else
            # Read models from scorecard environment file
            MODELS=$(grep '^QAIHM_TEST_MODELS=' build/scorecard-yamls/${{ inputs.action_id }}/environment.env | cut -d= -f2)
            echo "models=$MODELS" >> "$GITHUB_OUTPUT"
          fi

      - name: Split Models
        id: split
        run: |
          source "${{ env.VENV_PATH }}/bin/activate"
          BASE_ARGS="--models ${{ steps.determine_models.outputs.models }} --max-models-per-pt-split ${{ inputs.max_models_per_split }}"
          if [[ "${{ inputs.max_num_splits }}" != "0" ]]; then
            BASE_ARGS="$BASE_ARGS --max-num-pt-splits ${{ inputs.max_num_splits }}"
          fi
          EXPORT_MATRIX=$(python -m qai_hub_models.scripts.split_torch_models $BASE_ARGS --stage export_test --output-format github)
          ACCURACY_MATRIX=$(python -m qai_hub_models.scripts.split_torch_models $BASE_ARGS --stage accuracy --output-format github)
          echo "export_matrix=$EXPORT_MATRIX" >> "$GITHUB_OUTPUT"
          echo "accuracy_matrix=$ACCURACY_MATRIX" >> "$GITHUB_OUTPUT"
          echo "Export Splits: $EXPORT_MATRIX"
          echo "Accuracy Splits: $ACCURACY_MATRIX"

  start_export_jobs:
    name: Test Exports (${{ matrix.split.split_name }})
    needs: split_models
    secrets: inherit
    strategy:
      matrix:
        split: ${{ fromJson(needs.split_models.outputs.export_matrix) }}
      fail-fast: false
    uses: ./.github/workflows/scorecard_test_export_scripts.yml
    with:
      action_id: ${{ inputs.action_id }}
      s3_prefix: ${{ inputs.s3_prefix }}
      models: ${{ matrix.split.models }}
      split_name: ${{ matrix.split.split_name }}

  start_accuracy_jobs:
    name: Compute Accuracy (${{ matrix.split.split_name }})
    needs: split_models
    if: ${{ inputs.run_accuracy }}
    secrets: inherit
    strategy:
      matrix:
        split: ${{ fromJson(needs.split_models.outputs.accuracy_matrix) }}
      fail-fast: false
    uses: ./.github/workflows/scorecard_compute_device_accuracy.yml
    with:
      action_id: ${{ inputs.action_id }}
      models: ${{ matrix.split.models }}
      split_name: ${{ matrix.split.split_name }}

  combine_artifacts:
    name: Combine Split Artifacts
    needs: [split_models, start_export_jobs, start_accuracy_jobs]
    if: ${{ !cancelled() && needs.split_models.result == 'success' }}
    runs-on: [tetra-ubuntu-2204, self-hosted]
    steps:
      - uses: actions/checkout@v6

      - name: CI Setup
        uses: ./.github/actions/ci-setup
        with:
          sudo-password: ${{ secrets.TETRASERVICE_PASSWORD }}
          venv-path: ${{ env.VENV_PATH }}

      # --- Export Artifacts ---

      - name: Download All Split Release Asset Artifacts
        id: download_release_assets
        if: ${{ inputs.s3_prefix != '' }}
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: "Scorecard Cached Artifact (release-assets.yaml, ${{ inputs.action_id }}, *)"
          path: build/split-release-assets

      - name: Combine Release Assets
        if: ${{ inputs.s3_prefix != '' && steps.download_release_assets.outcome == 'success' }}
        run: |
          source "${{ env.VENV_PATH }}/bin/activate"
          python -m qai_hub_models.scripts.combine_split_artifacts \
            --input-dir build/split-release-assets \
            --output-dir build/combined-release-assets

      - name: Upload Combined Release Assets
        if: ${{ inputs.s3_prefix != '' && steps.download_release_assets.outcome == 'success' }}
        uses: actions/upload-artifact@v7
        with:
          name: Scorecard Cached Artifact (release-assets.yaml, ${{ inputs.action_id }})
          path: build/combined-release-assets/release-assets.yaml
          if-no-files-found: ignore

      - name: Delete Split Release Asset Artifacts
        if: ${{ inputs.s3_prefix != '' && steps.download_release_assets.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARTIFACT_PREFIX="Scorecard Cached Artifact (release-assets.yaml, ${{ inputs.action_id }}, "
          gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts --paginate -q ".artifacts[] | select(.name | startswith(\"$ARTIFACT_PREFIX\")) | .id" | while read artifact_id; do
            echo "Deleting artifact $artifact_id"
            gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$artifact_id || true
          done

      - name: Download All Split Export Test Results
        id: download_export_test_results
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: test-results-export-*
          path: build/split-export-test-results

      - name: Combine Export JUnit XML Files
        id: combine_export_test_results
        if: ${{ steps.download_export_test_results.outcome == 'success' }}
        run: |
          source "${{ env.VENV_PATH }}/bin/activate"
          python scripts/combine_junit_xml.py \
            --junit-xml build/split-export-test-results \
            --output build/combined-export-test-results/qaihm-export-zip-tests-junit.xml

      - name: Upload Combined Export Test Results
        if: ${{ steps.combine_export_test_results.outcome == 'success' }}
        uses: actions/upload-artifact@v7
        with:
          name: test-results-export
          path: build/combined-export-test-results

      - name: Delete Split Export Test Results
        if: ${{ steps.download_export_test_results.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARTIFACT_PREFIX="test-results-export-"
          gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts --paginate -q ".artifacts[] | select(.name | startswith(\"$ARTIFACT_PREFIX\")) | .id" | while read artifact_id; do
            echo "Deleting artifact $artifact_id"
            gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$artifact_id || true
          done

      # --- Accuracy Artifacts ---

      - name: Download All Split Accuracy CSV Artifacts
        id: download_accuracy_csvs
        if: ${{ inputs.run_accuracy }}
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: "Scorecard Cached Artifact (accuracy.csv, ${{ inputs.action_id }}, *)"
          path: build/split-accuracy-csvs

      - name: Combine Accuracy CSVs
        if: ${{ steps.download_accuracy_csvs.outcome == 'success' }}
        run: |
          source "${{ env.VENV_PATH }}/bin/activate"
          python -m qai_hub_models.scripts.combine_split_artifacts \
            --input-dir build/split-accuracy-csvs \
            --output-dir build/combined-accuracy-csvs

      - name: Upload Combined Accuracy CSV
        if: ${{ steps.download_accuracy_csvs.outcome == 'success' }}
        uses: actions/upload-artifact@v7
        with:
          name: Scorecard Cached Artifact (accuracy.csv, ${{ inputs.action_id }})
          path: build/combined-accuracy-csvs/accuracy.csv
          if-no-files-found: ignore

      - name: Delete Split Accuracy CSV Artifacts
        if: ${{ steps.download_accuracy_csvs.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARTIFACT_PREFIX="Scorecard Cached Artifact (accuracy.csv, ${{ inputs.action_id }}, "
          gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts --paginate -q ".artifacts[] | select(.name | startswith(\"$ARTIFACT_PREFIX\")) | .id" | while read artifact_id; do
            echo "Deleting artifact $artifact_id"
            gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$artifact_id || true
          done

      - name: Download All Split Accuracy Test Results
        id: download_accuracy_test_results
        if: ${{ inputs.run_accuracy }}
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: test-results-accuracy-*
          path: build/split-accuracy-test-results

      - name: Combine Accuracy JUnit XML Files
        id: combine_accuracy_test_results
        if: ${{ steps.download_accuracy_test_results.outcome == 'success' }}
        run: |
          source "${{ env.VENV_PATH }}/bin/activate"
          python scripts/combine_junit_xml.py \
            --junit-xml build/split-accuracy-test-results \
            --output build/combined-accuracy-test-results/qaihm-device-accuracy-tests-junit.xml

      - name: Upload Combined Accuracy Test Results
        if: ${{ steps.combine_accuracy_test_results.outcome == 'success' }}
        uses: actions/upload-artifact@v7
        with:
          name: test-results-accuracy
          path: build/combined-accuracy-test-results

      - name: Delete Split Accuracy Test Results
        if: ${{ steps.download_accuracy_test_results.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARTIFACT_PREFIX="test-results-accuracy-"
          gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts --paginate -q ".artifacts[] | select(.name | startswith(\"$ARTIFACT_PREFIX\")) | .id" | while read artifact_id; do
            echo "Deleting artifact $artifact_id"
            gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$artifact_id || true
          done
