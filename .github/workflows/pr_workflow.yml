##
## Pull Request Workflow
##

name: PR Workflow

on:
  push:
    branches: [ main , release-* ]
  pull_request:
    branches: [ main , release-* ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# only one active job per PR. this will cause jobs to be immediately
# cancelled on subsequent pushes in PRs.
# ref: https://docs.github.com/en/actions/using-jobs/using-concurrency#example-using-a-fallback-value
concurrency:
  group: pr-workflow-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-and-test-workflow:
    name: Test QAIHM (py3.10)
    secrets: inherit
    uses: ./.github/workflows/test.yml
    with:
      precommit_scope: ALL # never skippable
      models: ${{ github.actor == 'dependabot[bot]' && 'none' || (contains(github.event.pull_request.body, '%ALL_MODELS%') && 'all' || (contains(github.event.pull_request.body, '%SKIP_ALL_CI%') && 'none' || 'changed')) }}
      enable_compile_tests: ${{ github.actor != 'dependabot[bot]' }}
      deployment: prod
      is_pr: true

  check-jira-title:
    if: github.event_name == 'pull_request' && !endsWith(github.event.pull_request.user.login, '[bot]')
    name: Check JIRA in PR Title
    runs-on: [tetra-ubuntu-2204, self-hosted]
    steps:
      - uses: actions/checkout@v7
        with:
          sparse-checkout: scripts

      - name: Check JIRA in PR Title
        env:
          GH_TOKEN: ${{ secrets.STAGING_GH_TOKEN }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: scripts/ci/pr_jira_check.sh

  website-import-workflow:
    if: github.actor != 'dependabot[bot]'
    name: Test Website Import
    secrets: inherit
    uses: ./.github/workflows/release_website.yml
    with:
      import_mode: no-verify
