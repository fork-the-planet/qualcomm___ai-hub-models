name: YOLO-WORLD
id: yolo_world
status: published
headline: Real-time prompt based object detection optimized for mobile and edge by Ultralytics.
domain: Computer Vision
description: Ultralytics YOLO-World is an open-vocabulary object detection model that uses a prompt-then-detect strategy to predict bounding boxes for user-specified classes.
use_case: Object Detection
tags:
- real-time
applicable_scenarios:
- Factory Automation
- Robotic Navigation
- Camera
related_models:
- yolov8_det
- yolov8_seg
form_factors:
- Phone
- Tablet
- IoT
- XR
has_static_banner: true
has_animated_banner: false
dataset: ["coco"]
technical_details:
  Model checkpoint: yolov8s-worldv2
  Input resolution: 640x640
  Number of parameters: 12.7M
  Model size (float): 48.2 MB
  Model size (w8a8): 12.4 MB
  Model size (w8a16): 24.9 MB
license_type: gpl-3.0
research_paper: https://arxiv.org/abs/2401.17270
research_paper_title: 'YOLO-World: Real-Time Open-Vocabulary Object Detection'
source_repo: https://github.com/AILab-CVC/YOLO-World
license: https://github.com/AILab-CVC/YOLO-World/blob/master/LICENSE
imsdk_supported: true
